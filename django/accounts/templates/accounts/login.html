{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container-fluid">
    <div class="row no-gutters">
        <div class="col-md-6 d-none d-md-block bg-image"></div>

        <div class="col-md-6 login-container">
            <div class="col-10 col-lg-8 form-dark">
                <h2 class="font-weight-bold mb-1">Welcome Back!</h2>
                <p class="text-muted mb-4">Hello, Please fill out the form below to get started!</p>

                <div class="mb-4">
                    <a href="{% url 'login' %}" class="tab-link active">Login</a>
                    <a href="{% url 'register' %}" class="tab-link">Register</a>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    {% if error %}
                        <div class="alert alert-danger py-2" style="font-size: 14px;">{{ error }}</div>
                    {% endif %}
                    
                    <div class="form-group">
                        <input type="text" name="username" class="form-control" placeholder="Username" required>
                    </div>
                    <div class="form-group">
                        <input type="password" name="password" class="form-control" placeholder="Password" required>
                    </div>

                    <div class="custom-control custom-checkbox mb-4">
                        <input type="checkbox" class="custom-control-input" id="rememberMe">
                        <label class="custom-control-label text-muted" for="rememberMe">Remember me</label>
                    </div>

                    <button type="submit" class="btn btn-login btn-block shadow">Login</button>
                </form>

                
            </div>
        </div>
    </div>
</div>
{% endblock %}

</html>
