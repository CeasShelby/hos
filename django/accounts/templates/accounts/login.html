{% extends 'base.html' %}
{% load static %}
{% block content %}
<style>
    nav.navbar, footer { display: none !important; }
    
    body {
        margin: 0; padding: 0;
        min-height: 100vh;
        background: linear-gradient(145deg, #0a1f2e 0%, #0d2b3e 40%, #0a2035 70%, #061520 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Poppins', sans-serif;
        overflow: hidden;
    }

    /* Subtle background texture lines like the reference */
    body::before {
        content: '';
        position: fixed; inset: 0;
        background-image: 
            repeating-linear-gradient(
                135deg,
                transparent,
                transparent 60px,
                rgba(255,255,255,0.012) 60px,
                rgba(255,255,255,0.012) 61px
            );
        pointer-events: none;
    }

    /* Main Card */
    .login-card {
        background: linear-gradient(160deg, #0f2d3f 0%, #0d2537 50%, #091e2e 100%);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 32px;
        padding: 60px 50px;
        width: 100%;
        max-width: 440px;
        box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
        position: relative;
        z-index: 1;
    }

    /* Title */
    .login-title {
        text-align: center;
        font-size: 1.9rem;
        font-weight: 800;
        color: #fff;
        text-transform: uppercase;
        letter-spacing: 3px;
        margin-bottom: 48px;
    }

    /* Icon Pill Input */
    .icon-input-wrap {
        position: relative;
        margin-bottom: 24px;
        display: flex;
        align-items: center;
    }

    .icon-input-wrap input {
        width: 100%;
        height: 64px;
        border-radius: 50px;
        border: 1px solid rgba(255,255,255,0.07);
        background: rgba(255,255,255,0.055);
        color: #c9d8e8;
        font-size: 0.95rem;
        font-family: 'Poppins', sans-serif;
        outline: none;
        transition: all 0.3s ease;
        box-sizing: border-box;
    }

    /* Username: icon on LEFT → padding-left for icon, normal padding-right */
    .icon-left input  { padding-left: 80px; padding-right: 24px; }
    /* Password: icon on RIGHT → normal padding-left, padding-right for icon */
    .icon-right input { padding-left: 24px;  padding-right: 80px; }

    .icon-input-wrap input::placeholder { color: rgba(255,255,255,0.35); }
    .icon-input-wrap input:focus {
        border-color: rgba(0, 210, 255, 0.45);
        background: rgba(0, 210, 255, 0.06);
        box-shadow: 0 0 0 3px rgba(0, 210, 255, 0.1);
    }

    /* The circle icon button */
    .input-icon-circle {
        width: 52px; height: 52px;
        background: #fff;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        position: absolute;
        box-shadow: 0 4px 15px rgba(0,0,0,0.25);
        flex-shrink: 0;
    }
    .icon-left  .input-icon-circle { left: 6px; }
    .icon-right .input-icon-circle { right: 6px; }

    .input-icon-circle i { font-size: 1.1rem; color: #1b2631; }

    /* Error */
    .auth-error {
        background: rgba(255, 65, 108, 0.1);
        border: 1px solid rgba(255, 65, 108, 0.25);
        border-radius: 14px; padding: 12px 16px;
        color: #ff8fa0; font-size: 0.82rem; margin-bottom: 20px; text-align: center;
    }

    /* Login Button */
    .login-btn {
        width: 100%; height: 64px; margin-top: 36px;
        border: none; border-radius: 50px; cursor: pointer;
        background: #ffffff;
        color: #0d2537;
        font-size: 1rem; font-weight: 800;
        font-family: 'Poppins', sans-serif;
        letter-spacing: 3px; text-transform: uppercase;
        transition: all 0.3s ease;
        box-shadow: 0 8px 25px rgba(0,0,0,0.25);
    }
    .login-btn:hover {
        background: #e8f4ff;
        transform: translateY(-2px);
        box-shadow: 0 14px 35px rgba(0,0,0,0.35);
    }

    /* Footer link */
    .login-footer {
        text-align: center;
        margin-top: 28px;
        font-size: 0.82rem;
        color: rgba(255,255,255,0.3);
    }
    .login-footer a { color: #00d2ff; text-decoration: none; font-weight: 600; }
    .login-footer a:hover { color: #4facfe; }
</style>

<div class="login-card">
    <div class="login-title">User Login</div>

    {% if error %}
        <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <!-- Username with left icon -->
        <div class="icon-input-wrap icon-left">
            <div class="input-icon-circle">
                <i class="fas fa-user"></i>
            </div>
            <input type="text" name="username" placeholder="Username" required autocomplete="username">
        </div>

        <!-- Password with right icon -->
        <div class="icon-input-wrap icon-right">
            <input type="password" name="password" placeholder="Password" required autocomplete="current-password">
            <div class="input-icon-circle">
                <i class="fas fa-lock"></i>
            </div>
        </div>

        <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="login-footer">
        Don't have an account? <a href="{% url 'register' %}">Register</a>
    </div>
</div>
{% endblock %}
