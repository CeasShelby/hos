{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container-fluid">
    <div class="row no-gutters">
        <div class="col-md-6 d-none d-md-block bg-image"></div>

        <div class="col-md-6 register-container">
            <div class="col-10 col-lg-8 form-dark">
                <h2 class="font-weight-bold mb-1">Join Travello</h2>
                <p class="text-muted mb-4">Create your account to start your journey!</p>

                <div class="mb-4">
                    <a href="{% url 'login' %}" class="tab-link">Login</a>
                    <a href="{% url 'register' %}" class="tab-link active">Register</a>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="form-group mb-2">
                            {{ field }}
                            {% if field.errors %}
                                <div class="errorlist">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}

                    <button type="submit" class="btn btn-register btn-block shadow">Create Account</button>
                </form>

                
            </div>
        </div>
    </div>
</div>
{% endblock %}

</html>
