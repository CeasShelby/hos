{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="card bg-dark border-secondary p-4">
        <h3 class="text-white mb-4">Register Your Hostel</h3>
        
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row">
                {% for field in form %}
                    <div class="col-md-6 mb-3">
                        <label class="text-info small">{{ field.label }}</label>
                        {{ field }}
                        <span class="text-danger small">{{ field.errors }}</span>
                    </div>
                {% endfor %}
            </div>
            <button type="submit" class="btn btn-primary mt-3">Upload Listing</button>
        </form>
    </div>
</div>
{% endblock %}
