{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="card bg-dark border-secondary shadow-lg">
        <div class="card-header border-secondary bg-transparent">
            <h3 class="text-white">Add New Hostel Listing</h3>
        </div>
        <div class="card-body text-white">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="row">
                    <div class="col-md-12 mb-3">
                        <label>Hostel Name</label>
                        <input type="text" name="name" class="form-control bg-secondary text-white border-0" placeholder="e.g., Skyline Hostel">
                    </div>
                    
                    <div class="col-md-4 mb-3">
                        <label class="small text-muted">Main Compound Photo</label>
                        <input type="file" name="main_photo" class="form-control-file">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="small text-muted">Room Internal View</label>
                        <input type="file" name="room_photo" class="form-control-file">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="small text-muted">Bathroom/Facilities</label>
                        <input type="file" name="bath_photo" class="form-control-file">
                    </div>
                </div>
                
                <hr class="bg-secondary mt-4">
                <button type="submit" class="btn btn-primary px-5">Publish for Students</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
